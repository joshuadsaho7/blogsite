  if (!url) return null;

// Upload a File object to Firebase Storage, return download URL
async function uploadToStorage(file) {
  const ext  = file.name.split(".").pop();
  const path = `images/${Date.now()}_${Math.random().toString(36).substr(2,6)}.${ext}`;
  const ref  = storage.ref(path);
  await ref.put(file);
  return await ref.getDownloadURL();
}

const DEFAULT_ABOUT = { name:"Your Name", byline:"Writer · Photographer · Wanderer", bio:"I've been chasing horizons since I can remember. This journal is where I make sense of what I see.", portrait:"" };

function Footer({ articles, onArticle, isOwner, onSignIn, user }) {
  const [about, setAbout]     = useState(()=>{ try{ const s=localStorage.getItem("atlas-about"); return s?JSON.parse(s):DEFAULT_ABOUT; }catch{ return DEFAULT_ABOUT; } });
  const [editing, setEditing] = useState(false);
  const [draft, setDraft]     = useState(about);
  const [uploading, setUploading] = useState(false);
  const portraitRef = useRef();

  const saveAbout = () => { setAbout(draft); try{ localStorage.setItem("atlas-about",JSON.stringify(draft)); }catch{} setEditing(false); };

  const handlePortrait = async file => {
    if (!file) return;
    setUploading(true);
    try {
      const ext=file.name.split(".").pop();
      const ref=storage.ref(`portraits/${Date.now()}.${ext}`);
      await ref.put(file);
      const url=await ref.getDownloadURL();
      setDraft(d=>({...d,portrait:url}));
    } catch(e){ alert("Upload failed: "+e.message); }
    setUploading(false);
  };

  const recent = [...articles].filter(a=>a.status==="published").sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);

  return (
    <>
      <footer className="footer">
        <div className="footer-main">
          <div className="footer-about">
            {about.portrait ? <img src={about.portrait} className="footer-portrait" alt={about.name} /> : <div className="footer-portrait-ph">👤</div>}
            <div>
              <div className="footer-name">{about.name}</div>
              <div className="footer-byline">{about.byline}</div>
              <p className="footer-bio">{about.bio}</p>
              {isOwner && <button className="footer-edit-btn" style={{marginTop:14}} onClick={()=>{setDraft(about);setEditing(true);}}>Edit about me</button>}
            </div>
          </div>
          <div>
            <div className="footer-col-title">Recent Dispatches</div>
            <div className="footer-links">
              {recent.map(a=>(
                <div key={a.id} className="footer-link" onClick={()=>onArticle(a)}>
                  <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.title||"Untitled"}</span>
                  {a.location && <span className="footer-link-loc">{a.location.split(",")[0]}</span>}
                </div>
              ))}
              {recent.length===0 && <span style={{fontSize:13,color:"#2a2826",fontStyle:"italic"}}>No articles yet</span>}
            </div>
          </div>
        </div>
        <div className="footer-bottom">
          <span className="footer-copy">© {new Date().getFullYear()} · All rights reserved</span>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            {!user && <span className="footer-admin-link" onClick={onSignIn}>·</span>}
            <span className="footer-logo">ATLAS<em>.</em></span>
          </div>
        </div>
      </footer>

      {editing && (
        <div className="about-modal-bg" onClick={()=>setEditing(false)}>
          <div className="about-modal" onClick={e=>e.stopPropagation()}>
            <h3>About me</h3>
            <p className="about-modal-sub">Appears in the footer of your journal</p>
            <input className="ae-field" placeholder="Your name" value={draft.name} onChange={e=>setDraft(d=>({...d,name:e.target.value}))} />
            <input className="ae-field" placeholder="Short byline" value={draft.byline} onChange={e=>setDraft(d=>({...d,byline:e.target.value}))} />
            <textarea className="ae-field" rows={3} placeholder="A short bio…" value={draft.bio} onChange={e=>setDraft(d=>({...d,bio:e.target.value}))} />
            <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:12}}>
              <input className="ae-field" style={{marginBottom:0,flex:1}} placeholder="Portrait URL (or upload →)" value={draft.portrait} onChange={e=>setDraft(d=>({...d,portrait:e.target.value}))} />
              <button className="btn btn-outline btn-sm" style={{flexShrink:0,whiteSpace:"nowrap"}} onClick={()=>portraitRef.current.click()}>{uploading?"Uploading…":"⬆ Upload"}</button>
              <input type="file" ref={portraitRef} accept="image/*" style={{display:"none"}} onChange={e=>handlePortrait(e.target.files[0])} />
            </div>
            {draft.portrait && <img src={draft.portrait} style={{width:64,height:64,borderRadius:"50%",objectFit:"cover",marginBottom:14,border:"2px solid rgba(201,168,76,.3)"}} />}
            <div className="ae-btns">
              <button className="btn btn-outline btn-sm" onClick={()=>setEditing(false)}>Cancel</button>
              <button className="btn btn-gold btn-sm" onClick={saveAbout}>Save</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

// ── IMAGE UPLOAD MODAL ────────────────────────────────────────
function ImageModal({ onInsert, onClose }) {
  const [tab, setTab]       = useState("upload"); // "upload" | "url"
  const [url, setUrl]       = useState("");
  const [cap, setCap]       = useState("");
  const [showPrev, setShowPrev] = useState(false);
  const [over, setOver]     = useState(false);
  const [uploading, setUploading] = useState(false);
  const [progress, setProgress]   = useState(0);
  const [uploadedUrl, setUploadedUrl] = useState("");
  const fileRef = useRef();

  const handleFile = async (file) => {
    if (!file || !file.type.startsWith("image/")) return;
    setUploading(true); setProgress(0); setUploadedUrl("");
    try {
      const ext  = file.name.split(".").pop();
      const path = `images/${Date.now()}_${Math.random().toString(36).substr(2,6)}.${ext}`;
      const ref  = storage.ref(path);
      const task = ref.put(file);
      task.on("state_changed", snap => setProgress(Math.round(snap.bytesTransferred/snap.totalBytes*100)));
      await task;
      const dl = await ref.getDownloadURL();
      setUploadedUrl(dl);
    } catch(e) { alert("Upload failed: " + e.message); }
    setUploading(false);
  };

  const handleDrop = e => {
    e.preventDefault(); setOver(false);
    handleFile(e.dataTransfer.files[0]);
  };

  const finalUrl = tab === "upload" ? uploadedUrl : url;

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <h3>Insert photo</h3>
        <p className="modal-sub">Upload from your computer or paste a URL</p>
        <div className="modal-tabs">
          <button className={`modal-tab${tab==="upload"?" on":""}`} onClick={()=>setTab("upload")}>⬆ Upload from laptop</button>
          <button className={`modal-tab${tab==="url"?" on":""}`} onClick={()=>setTab("url")}>🔗 Paste URL</button>
        </div>

        {tab === "upload" && (
          <>
            {!uploadedUrl && !uploading && (
              <div className={`upload-drop${over?" over":""}`}
                onDragOver={e=>{e.preventDefault();setOver(true);}}
                onDragLeave={()=>setOver(false)}
                onDrop={handleDrop}
                onClick={()=>fileRef.current.click()}>
                <input type="file" ref={fileRef} accept="image/*" onChange={e=>handleFile(e.target.files[0])} />
                <span style={{fontSize:28,opacity:.3}}>⬜</span>
                <span>Click to choose a photo, or drag one here</span>
                <span style={{fontSize:11,color:"#343230"}}>JPG, PNG, WEBP, GIF</span>
              </div>
            )}
            {uploading && (
              <div style={{marginBottom:10}}>
                <div style={{fontSize:12,color:"#706050",marginBottom:6,fontFamily:"'Helvetica Neue',sans-serif"}}>Uploading… {progress}%</div>
                <div className="upload-prog"><div className="upload-prog-bar" style={{width:`${progress}%`}} /></div>
              </div>
            )}
            {uploadedUrl && (
              <>
                <img src={uploadedUrl} className="modal-prev" />
                <button className="btn btn-ghost btn-xs" style={{marginBottom:10}} onClick={()=>{setUploadedUrl("");setProgress(0);}}>Change photo</button>
              </>
            )}
          </>
        )}

        {tab === "url" && (
          <>
            {showPrev && url && <img src={url} className="modal-prev" onError={()=>setShowPrev(false)} />}
            <input className="modal-field" placeholder="https://images.unsplash.com/…" value={url} onChange={e=>setUrl(e.target.value)} onBlur={()=>setShowPrev(true)} autoFocus={tab==="url"} />
          </>
        )}

        <input className="modal-field" placeholder="Caption (optional)" value={cap} onChange={e=>setCap(e.target.value)} onKeyDown={e=>e.key==="Enter"&&finalUrl&&onInsert(finalUrl,cap)} />
        <div className="modal-btns">
          <button className="btn btn-outline btn-sm" onClick={onClose}>Cancel</button>
          <button className="btn btn-gold btn-sm" disabled={!finalUrl||uploading} style={{opacity:finalUrl&&!uploading?1:.4,cursor:finalUrl&&!uploading?"pointer":"default"}} onClick={()=>finalUrl&&onInsert(finalUrl,cap)}>Insert photo</button>
        </div>
      </div>
    </div>
  );
}

// ── TOOLBAR ───────────────────────────────────────────────────
function Toolbar({ editorRef, onUpdate }) {
  const [fmt, setFmt]       = useState({});
  const [imgModal, setImgModal] = useState(false);
  const [vidModal, setVidModal] = useState(false);
  const savedRange = useRef(null);
  const exec = (cmd,val=null) => { document.execCommand(cmd,false,val); editorRef.current?.focus(); refresh(); onUpdate?.(); };
  const refresh = () => setFmt({b:document.queryCommandState("bold"),i:document.queryCommandState("italic"),u:document.queryCommandState("underline"),ol:document.queryCommandState("insertOrderedList"),ul:document.queryCommandState("insertUnorderedList")});
  const saveR   = () => { const s=window.getSelection(); if(s.rangeCount) savedRange.current=s.getRangeAt(0).cloneRange(); };
  const restoreR= () => { if(savedRange.current){const s=window.getSelection();s.removeAllRanges();s.addRange(savedRange.current);} };
  const openImg = () => { saveR(); setImgModal(true); };
  const insertImg = (url,cap) => {
    if (!url){setImgModal(false);return;}
    setImgModal(false); editorRef.current?.focus(); restoreR();
    document.execCommand("insertHTML",false,`<figure><img src="${url}" alt="${cap||""}" />${cap?`<figcaption>${cap}</figcaption>`:""}</figure><p><br></p>`);
    onUpdate?.();
  };
  const openVid = () => { saveR(); setVidModal(true); };
  const insertVid = (url,cap) => {
    if (!url){setVidModal(false);return;}
    const embed=toVideoEmbed(url); if(!embed){setVidModal(false);return;}
    setVidModal(false); editorRef.current?.focus(); restoreR();
    document.execCommand("insertHTML",false,`<div class="video-wrap"><iframe src="${embed.src}" allowfullscreen title="${embed.label}"></iframe></div>${cap?`<p class="video-cap">${cap}</p>`:""}<p><br></p>`);
    onUpdate?.();
  };
  const T = ({t,on,fn,ch}) => <button title={t} className={`tbtn${on?" on":""}`} onMouseDown={e=>{e.preventDefault();fn();}}>{ch}</button>;
  return (
    <>
      <div className="toolbar" onMouseUp={refresh}>
        <T t="Bold" on={fmt.b} fn={()=>exec("bold")} ch={<b>B</b>} />
        <T t="Italic" on={fmt.i} fn={()=>exec("italic")} ch={<em>I</em>} />
        <T t="Underline" on={fmt.u} fn={()=>exec("underline")} ch={<u>U</u>} />
        <div className="tsep" />
        <T t="H2" on={false} fn={()=>exec("formatBlock","H2")} ch="H2" />
        <T t="H3" on={false} fn={()=>exec("formatBlock","H3")} ch="H3" />
        <T t="¶" on={false} fn={()=>exec("formatBlock","P")} ch="¶" />
        <div className="tsep" />
        <T t="Blockquote" on={false} fn={()=>{const s=window.getSelection();if(!s.rangeCount)return;const r=s.getRangeAt(0),bq=document.createElement("blockquote");bq.appendChild(s.isCollapsed?document.createTextNode("Quote…"):r.extractContents());r.insertNode(bq);s.collapse(bq,1);onUpdate?.();}} ch={'"'} />
        <T t="Bullets" on={fmt.ul} fn={()=>exec("insertUnorderedList")} ch="• —" />
        <T t="Numbers" on={fmt.ol} fn={()=>exec("insertOrderedList")} ch="1." />
        <div className="tsep" />
        <T t="Insert photo" on={false} fn={openImg} ch="⬜ Photo" />
        <T t="Embed video" on={false} fn={openVid} ch="▶ Video" />
        <T t="Link" on={false} fn={()=>{const u=prompt("URL:");if(u)exec("createLink",u);}} ch="⌁" />
        <div className="tsep" />
        <T t="Divider" on={false} fn={()=>exec("insertHorizontalRule")} ch="——" />
        <T t="Undo" on={false} fn={()=>exec("undo")} ch="↩" />
        <T t="Redo" on={false} fn={()=>exec("redo")} ch="↪" />
      </div>
      {imgModal && <ImageModal onInsert={insertImg} onClose={()=>setImgModal(false)} />}
      {vidModal && <VideoModal onInsert={insertVid} onClose={()=>setVidModal(false)} />}
    </>
  );
}

// ── COVER UPLOAD ──────────────────────────────────────────────
// Shared component used in Editor for the cover photo zone
function CoverUpload({ cover, onCover }) {
  const [coverOk, setCoverOk]   = useState(!!cover);
  const [showUrl, setShowUrl]   = useState(!cover);
  const [uploading, setUploading] = useState(false);
  const [progress, setProgress]   = useState(0);
  const [over, setOver]           = useState(false);
  const fileRef = useRef();

  const handleFile = async file => {
    if (!file || !file.type.startsWith("image/")) return;
    setUploading(true); setProgress(0);
    try {
      const ext  = file.name.split(".").pop();
      const path = `covers/${Date.now()}_${Math.random().toString(36).substr(2,6)}.${ext}`;
      const ref  = storage.ref(path);
      const task = ref.put(file);
      task.on("state_changed", snap => setProgress(Math.round(snap.bytesTransferred/snap.totalBytes*100)));
      await task;
      const dl = await ref.getDownloadURL();
      onCover(dl); setCoverOk(true); setShowUrl(false);
    } catch(e) { alert("Upload failed: "+e.message); }
    setUploading(false);
  };

  return (
    <>
      <div className="cover-zone">
        {cover && coverOk ? (
          <>
            <img src={cover} className="cover-preview" onError={()=>setCoverOk(false)} />
            <div className="cover-change-btns">
              <button className="btn btn-ghost btn-xs" onClick={()=>fileRef.current.click()}>⬆ Upload new</button>
              <button className="btn btn-ghost btn-xs" onClick={()=>setShowUrl(v=>!v)}>🔗 URL</button>
            </div>
          </>
        ) : uploading ? (
          <div style={{width:"100%",height:160,background:"#141316",borderRadius:10,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:10}}>
            <div style={{fontSize:12,color:"#706050",fontFamily:"'Helvetica Neue',sans-serif"}}>Uploading cover… {progress}%</div>
            <div className="upload-prog" style={{width:"60%"}}><div className="upload-prog-bar" style={{width:`${progress}%`}} /></div>
          </div>
        ) : (
          <div className={`cover-placeholder${over?" over":""}`}
            onDragOver={e=>{e.preventDefault();setOver(true);}}
            onDragLeave={()=>setOver(false)}
            onDrop={e=>{e.preventDefault();setOver(false);handleFile(e.dataTransfer.files[0]);}}
            onClick={()=>fileRef.current.click()}>
            <div style={{fontSize:24,opacity:.25}}>⬜</div>
            <span>Click or drag to upload a cover photo</span>
            <span style={{fontSize:11,color:"#2e2c2a"}}>or paste a URL below</span>
          </div>
        )}
        <input type="file" ref={fileRef} accept="image/*" style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])} />
      </div>
      {(showUrl || (!cover && !uploading)) && (
        <div className="cover-url-wrap">
          <input className="ef ef-url" placeholder="…or paste image URL here" value={cover} onChange={e=>{onCover(e.target.value);setCoverOk(true);}} onBlur={()=>{if(cover)setShowUrl(false);}} />
        </div>
      )}
    </>
  );
}

// ── EDITOR ────────────────────────────────────────────────────
function Editor({ article, onSave, onCancel }) {
  const [title,    setTitle]    = useState(article?.title||"");
  const [subtitle, setSubtitle] = useState(article?.subtitle||"");
  const [location, setLocation] = useState(article?.location||"");
  const [date,     setDate]     = useState(article?.date||new Date().toISOString().split("T")[0]);
  const [cover,    setCover]    = useState(article?.coverImage||"");
  const [spotifyUrl, setSpotifyUrl] = useState(article?.spotifyUrl||"");
  const editorRef = useRef(null);
  useEffect(()=>{ if(editorRef.current) editorRef.current.innerHTML=article?.content||""; },[]);
  const save = status => onSave({...article, id:article?.id||genId(), title, subtitle, location, date, coverImage:cover, spotifyUrl, content:editorRef.current?.innerHTML||"", status, createdAt:article?.createdAt||new Date().toISOString(), updatedAt:new Date().toISOString()});
  const spotifyEmbed = toSpotifyEmbed(spotifyUrl);
  return (
    <div className="ed">
      <div className="ed-top">
        <span className="ed-label">{article?.id?"Edit Article":"New Article"}</span>
        <div className="ed-actions">
          <button className="btn btn-outline btn-sm" onClick={onCancel}>Cancel</button>
          <button className="btn btn-outline btn-sm" onClick={()=>save("draft")}>Save draft</button>
          <button className="btn btn-gold btn-sm" onClick={()=>save("published")}>Publish</button>
        </div>
      </div>
      <CoverUpload cover={cover} onCover={setCover} />
      <input className="ef ef-title" placeholder="Article title" value={title} onChange={e=>setTitle(e.target.value)} />
      <input className="ef ef-sub" placeholder="Subtitle…" value={subtitle} onChange={e=>setSubtitle(e.target.value)} />
      <div className="ef-meta-row">
        <input className="ef" style={{textTransform:"uppercase",letterSpacing:"1px"}} placeholder="Location" value={location} onChange={e=>setLocation(e.target.value)} />
        <input className="ef" type="date" value={date} onChange={e=>setDate(e.target.value)} />
      </div>
      <div className="ed-spacer" />
      <Toolbar editorRef={editorRef} onUpdate={()=>{}} />
      <div ref={editorRef} contentEditable suppressContentEditableWarning className="ed-area" data-ph="Begin writing your dispatch…" />
      <p className="ed-hint">⬜ Photo uploads from your laptop or URL · ▶ Video embeds YouTube/Vimeo · Ctrl+B bold · Ctrl+I italic</p>
      <div className="spotify-ed-section">
        <div className="spotify-ed-label"><SpotifyIcon /> Soundtrack</div>
        <input className="ef ef-url" placeholder="Spotify playlist, album, or track URL (optional)" value={spotifyUrl} onChange={e=>setSpotifyUrl(e.target.value)} />
        <p className="spotify-ed-hint">e.g. https://open.spotify.com/playlist/…</p>
        {spotifyEmbed && <div className="spotify-preview"><iframe src={spotifyEmbed} width="100%" height="152" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy" style={{borderRadius:12}} title="Spotify preview" /></div>}
      </div>
    </div>
  );
}

// ── CAROUSEL ──────────────────────────────────────────────────
function Carousel({ articles, onArticle, isOwner, openNew }) {
  const [idx, setIdx]         = useState(0);
  const [progress, setProgress] = useState(0);
  const [animating, setAnimating] = useState(false);
  const timerRef = useRef(null);
  const pubs = articles.filter(a=>a.status==="published"&&a.coverImage);
  const displayed = pubs.length>0 ? pubs : articles.filter(a=>a.status==="published");

  const goTo = useCallback(i => {
    setIdx(i); setProgress(0); setAnimating(false); clearTimeout(timerRef.current);
    setTimeout(()=>{setProgress(100);setAnimating(true);},60);
    timerRef.current = setTimeout(()=>goTo((i+1)%Math.max(displayed.length,1)),5600);
  },[displayed.length]);

  useEffect(()=>{
    if(!displayed.length) return;
    setProgress(0); setAnimating(false);
    const t1=setTimeout(()=>{setProgress(100);setAnimating(true);},80);
    timerRef.current=setTimeout(()=>goTo(1%displayed.length),5600);
    return ()=>{clearTimeout(t1);clearTimeout(timerRef.current);};
  },[displayed.length]);

  if(!displayed.length) return (
    <div style={{height:"60vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,background:"#0a0a0c"}}>
      <p style={{fontStyle:"italic",color:"#2a2826",fontSize:22}}>Your journey begins here.</p>
      {isOwner && <button className="btn btn-gold" onClick={openNew}>Write your first article</button>}
    </div>
  );

  return (
    <div className="carousel">
      {displayed.map((a,i)=>(
        <div key={a.id} className={`carousel-slide${i===idx%displayed.length?" active":""}`} onClick={()=>onArticle(a)}>
          {a.coverImage && <img src={a.coverImage} alt="" />}
          <div className="carousel-grad" />
          {a.date && <span className="carousel-date">{fmtDate(a.date)}</span>}
          <div className="carousel-body">
            {a.location && <span className="carousel-loc">{a.location}</span>}
            <h2 className="carousel-title">{a.title||"Untitled"}</h2>
            {a.subtitle && <p className="carousel-sub">{a.subtitle}</p>}
            <button className="carousel-read" onClick={e=>{e.stopPropagation();onArticle(a);}}>Read article →</button>
          </div>
        </div>
      ))}
      <div className={`carousel-progress${animating?" animating":""}`} style={{width:`${progress}%`}} />
      {displayed.length>1 && <div className="carousel-dots">{displayed.map((_,i)=><button key={i} className={`cdot${i===idx%displayed.length?" on":""}`} onClick={e=>{e.stopPropagation();goTo(i);}} />)}</div>}
      {displayed.length>1 && <>
        <button className="carousel-arr prev" onClick={e=>{e.stopPropagation();goTo((idx-1+displayed.length)%displayed.length);}}>‹</button>
        <button className="carousel-arr next" onClick={e=>{e.stopPropagation();goTo((idx+1)%displayed.length);}}>›</button>
      </>}
    </div>
  );
}

// ── GRID CARD ─────────────────────────────────────────────────
function GridCard({ article, onClick }) {
  return (
    <div className="card" onClick={()=>onClick(article)}>
      <div className="card-img">{article.coverImage?<img src={article.coverImage} alt="" />:<div className="card-no-img">✈</div>}</div>
      <div className="card-body">
        {article.location && <div className="card-loc">{article.location}</div>}
        <h3 className="card-title">{article.title||"Untitled"}</h3>
        <p className="card-sub">{article.subtitle||exc(article.content||"")}</p>
        {article.date && <div className="card-date">{fmtShort(article.date)}</div>}
      </div>
    </div>
  );
}

// ── HOME ──────────────────────────────────────────────────────
function Home({ articles, onArticle, isOwner, onPublish, onDelete }) {
  const pub    = [...articles].filter(a=>a.status==="published").sort((a,b)=>new Date(b.date)-new Date(a.date));
  const drafts = [...articles].filter(a=>a.status==="draft").sort((a,b)=>new Date(b.updatedAt||0)-new Date(a.updatedAt||0));
  return (
    <div className="home">
      {pub.length===0
        ? <div className="empty"><p className="empty-head">No published articles yet.</p>{isOwner&&<p className="empty-sub">Write your first dispatch and hit Publish.</p>}</div>
        : <><div className="section-label">All Dispatches</div><div className="grid">{pub.map(a=><GridCard key={a.id} article={a} onClick={onArticle} />)}</div></>}
      {isOwner && drafts.length>0 && (
        <div className="drafts">
          <div className="drafts-divider"><div className="drafts-divider-line" /><span className="drafts-divider-label">Drafts</span><div className="drafts-divider-line" /></div>
          {drafts.map(a=>(
            <div key={a.id} className="draft-row" onClick={()=>onArticle(a)}>
              <div className="dr-left">
                {a.coverImage?<img src={a.coverImage} className="dr-thumb" onError={e=>e.target.style.display="none"} />:<div className="dr-thumb-empty" />}
                <div>
                  <div className={`dr-title${!a.title?" empty":""}`}>{a.title||"Untitled draft"}</div>
                  {a.location&&<div className="dr-loc">{a.location}</div>}
                </div>
              </div>
              <div className="dr-right">
                {a.date&&<span className="dr-date">{fmtShort(a.date)}</span>}
                <button className="btn btn-outline btn-xs" onClick={e=>{e.stopPropagation();onPublish(a);}}>Publish</button>
                <button className="btn btn-red btn-xs" onClick={e=>{e.stopPropagation();if(confirm("Delete draft?"))onDelete(a.id);}}>✕</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── ARTICLE VIEW ──────────────────────────────────────────────
function ArticleView({ article, onEdit, onBack, onToggle, onDelete, isOwner }) {
  const hasImg = !!article.coverImage;
  const spotifyEmbed = toSpotifyEmbed(article.spotifyUrl||"");
  return (
    <div>
      {hasImg ? (
        <div className="av-hero"><img src={article.coverImage} alt="" /><div className="av-hero-grad" /><div className="av-hero-text">{article.location&&<span className="av-loc">{article.location}</span>}<h1 className="av-title">{article.title||"Untitled"}</h1>{article.subtitle&&<p className="av-sub">{article.subtitle}</p>}</div></div>
      ) : (
        <div className="av-no-hero-text">{article.location&&<span className="av-loc">{article.location}</span>}<h1 className="av-title onpage">{article.title||"Untitled"}</h1>{article.subtitle&&<p className="av-sub onpage">{article.subtitle}</p>}</div>
      )}
      <div className="av-bar">
        <div className="av-bar-l">
          <button className="btn btn-ghost btn-sm" onClick={onBack}>← All</button>
          {article.date && <span className="av-date">{fmtDate(article.date)}</span>}
          {isOwner && <span className={`av-status ${article.status==="published"?"pub":"draft"}`}>{article.status}</span>}
        </div>
        {isOwner && (
          <div className="av-bar-r">
            <button className="btn btn-outline btn-sm" onClick={()=>onToggle(article)}>{article.status==="published"?"Unpublish":"Publish"}</button>
            <button className="btn btn-outline btn-sm" onClick={()=>onEdit(article)}>Edit</button>
            <button className="btn btn-red btn-sm" onClick={()=>{if(confirm("Delete this article permanently?"))onDelete(article.id);}}>Delete</button>
          </div>
        )}
      </div>
      <div className="av-content">
        <div className="av-body" dangerouslySetInnerHTML={{__html:article.content||"<p>No content yet.</p>"}} />
      </div>
      {spotifyEmbed && (
        <div className="spotify-section">
          <div className="spotify-rule">
            <div className="spotify-rule-line" />
            <div className="spotify-rule-inner">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="#1DB954"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
              <span className="spotify-rule-label">Soundtrack</span>
            </div>
            <div className="spotify-rule-line" />
          </div>
          <div className="spotify-embed-wrap">
            <iframe src={spotifyEmbed} width="100%" height="352" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy" style={{borderRadius:12}} title="Spotify playlist" />
          </div>
        </div>
      )}
    </div>
  );
}

// ── NAV AUTH MENU ─────────────────────────────────────────────
function NavAuth({ user, isOwner, onSignIn, onSignOut, onNew }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  const uidUnset = OWNER_UID === "PASTE_YOUR_UID_HERE";

  useEffect(()=>{
    const h = e => { if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", h);
    return ()=>document.removeEventListener("mousedown", h);
  },[]);

  const copyUid = () => {
    if (user?.uid) { navigator.clipboard.writeText(user.uid).catch(()=>{}); alert("UID copied! Paste it into your index.html as OWNER_UID, then redeploy."); }
  };

  if (!user) return null; // signed-out users see nothing — sign-in is via footer link

  return (
    <div style={{position:"relative"}} ref={ref}>
      {isOwner && <button className="btn btn-gold btn-sm" onClick={onNew} style={{marginRight:6}}>+ New</button>}
      <img
        src={user.photoURL||`https://ui-avatars.com/api/?name=${encodeURIComponent(user.displayName||"U")}&background=${isOwner?"c9a84c":"1a1818"}&color=${isOwner?"0a0a0c":"484440"}&size=60`}
        className="auth-avatar"
        style={!isOwner?{opacity:.5,borderColor:"rgba(255,255,255,0.06)"}:{}}
        alt="" onClick={()=>setOpen(v=>!v)}
      />
      {open && (
        <div className="auth-menu">
          <div className="auth-menu-user">
            <div className="auth-menu-name">{user.displayName}</div>
            <div className="auth-menu-email">{user.email}</div>
            {/* Always show UID if OWNER_UID not yet set, so they can copy it */}
            {(uidUnset || isOwner) && (
              <div className="auth-menu-uid" onClick={copyUid} title="Click to copy">
                <div className="auth-menu-uid-label">{uidUnset ? "⚠ Copy your UID → paste into file" : "Your UID"}</div>
                {user.uid}
              </div>
            )}
            {!isOwner && !uidUnset && <div style={{fontSize:10,color:"#706050",marginTop:4,fontFamily:"'Helvetica Neue',sans-serif",letterSpacing:"1px"}}>VIEW ONLY</div>}
          </div>
          <button className="auth-menu-btn danger" onClick={()=>{onSignOut();setOpen(false);}}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
            Sign out
          </button>
        </div>
      )}
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────
function App() {
  const [articles, setArticles] = useState([]);
  const [ready,    setReady]    = useState(false);
  const [view,     setView]     = useState("home");
  const [selected, setSelected] = useState(null);
  const [scrolled, setScrolled] = useState(false);
  const [user,     setUser]     = useState(null);

  const isOwner = !!(user && OWNER_UID !== "PASTE_YOUR_UID_HERE" && user.uid === OWNER_UID);

  useEffect(()=>{ return auth.onAuthStateChanged(u=>setUser(u)); },[]);

  useEffect(()=>{
    const onScroll = ()=>setScrolled(window.scrollY>50);
    window.addEventListener("scroll",onScroll,{passive:true});
    const listener = db.on("value", snap=>{
      const data=snap.val();
      setArticles(data ? Object.keys(data).map(k=>({...data[k],id:k})).sort((a,b)=>new Date(b.date||0)-new Date(a.date||0)) : []);
      setReady(true);
      const ld=document.getElementById("loading");
      if(ld){ld.style.opacity="0";setTimeout(()=>ld.remove(),400);}
    });
    return ()=>{ window.removeEventListener("scroll",onScroll); db.off("value",listener); };
  },[]);

  const signIn  = ()=>{ const p=new firebase.auth.GoogleAuthProvider(); auth.signInWithPopup(p).catch(e=>alert("Sign in failed: "+e.message)); };
  const signOut = ()=>auth.signOut();

  const handleSave = art => {
    if(!isOwner) return;
    const id=art.id||genId();
    const na={...art,id,updatedAt:new Date().toISOString(),createdAt:art.createdAt||new Date().toISOString(),status:art.status||"draft"};
    db.child(id).set(na).then(()=>{setSelected(na);setView("article");window.scrollTo(0,0);});
  };
  const handleToggle = art => {
    if(!isOwner) return;
    const u={...art,status:art.status==="published"?"draft":"published",updatedAt:new Date().toISOString()};
    db.child(art.id).update({status:u.status,updatedAt:u.updatedAt});
    setSelected(u);
  };
  const handleDelete  = id=>{ if(!isOwner)return; db.child(id).remove().then(()=>{setView("home");setSelected(null);}); };
  const handlePublish = art=>{ if(!isOwner)return; db.child(art.id).update({status:"published",updatedAt:new Date().toISOString()}); };
  const openArticle   = a=>{ setSelected(a);setView("article");window.scrollTo(0,0); };
  const openNew       = ()=>{ if(!isOwner)return; setSelected(null);setView("editor");window.scrollTo(0,0); };
  const goHome        = ()=>{ setView("home");window.scrollTo(0,0); };

  if(!ready) return null;

  return (
    <div className="app">
      <style>{CSS}</style>

      {/* ── NAV ── */}
      <nav className={`nav${scrolled?" scrolled":""}`}>
        <div className="nav-logo" onClick={goHome}>ATLAS<em>.</em></div>
        <div className="nav-right">
          <NavAuth user={user} isOwner={isOwner} onSignIn={signIn} onSignOut={signOut} onNew={openNew} />
        </div>
      </nav>

      {/* ── VIEWS ── */}
      {view==="home" && <>
        <Carousel articles={articles} onArticle={openArticle} isOwner={isOwner} openNew={openNew} />
        <Home articles={articles} onArticle={openArticle} isOwner={isOwner} onPublish={handlePublish} onDelete={handleDelete} />
        <Footer articles={articles} onArticle={openArticle} isOwner={isOwner} onSignIn={signIn} user={user} />
      </>}

      {view==="article" && selected && <>
        <ArticleView article={selected} isOwner={isOwner}
          onBack={goHome}
          onEdit={a=>{if(isOwner){setSelected(a);setView("editor");window.scrollTo(0,0);}}}
          onToggle={handleToggle}
          onDelete={handleDelete} />
        <Footer articles={articles} onArticle={openArticle} isOwner={isOwner} onSignIn={signIn} user={user} />
      </>}

      {view==="editor" && isOwner && (
        <Editor article={selected} onSave={handleSave} onCancel={()=>setView(selected?"article":"home")} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
