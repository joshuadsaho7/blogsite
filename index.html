  if (yt) return { src:`https://www.youtube.com/embed/${yt[1]}?rel=0`, label:"YouTube" };

function ImageModal({ onInsert, onClose }) {

    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <h3>Insert photo</h3><p>Paste any image URL to embed it in your article</p>
        {showP && url && <img src={url} className="modal-prev" onError={() => setShowP(false)} />}
        <input className="modal-field" placeholder="https://images.unsplash.com/…" value={url} onChange={e => setUrl(e.target.value)} onBlur={() => setShowP(true)} autoFocus />
        <input className="modal-field" placeholder="Caption (optional)" value={cap} onChange={e => setCap(e.target.value)} onKeyDown={e => e.key === "Enter" && onInsert(url, cap)} />

      </div>
    </div>
  );
}

function Toolbar({ editorRef, onUpdate }) {
  const [fmt, setFmt] = useState({});
  const [imgModal, setImgModal] = useState(false);
  const [vidModal, setVidModal] = useState(false);
  const savedRange = useRef(null);
  const exec = (cmd, val=null) => { document.execCommand(cmd,false,val); editorRef.current?.focus(); refresh(); onUpdate?.(); };
  const refresh = () => setFmt({ b:document.queryCommandState("bold"), i:document.queryCommandState("italic"), u:document.queryCommandState("underline"), ol:document.queryCommandState("insertOrderedList"), ul:document.queryCommandState("insertUnorderedList") });
  const saveRange = () => { const s=window.getSelection(); if(s.rangeCount) savedRange.current=s.getRangeAt(0).cloneRange(); };
  const restoreRange = () => { if(savedRange.current){const s=window.getSelection();s.removeAllRanges();s.addRange(savedRange.current);} };
  const openImg = () => { saveRange(); setImgModal(true); };
  const insertImg = (url, cap) => {
    if (!url){setImgModal(false);return;}
    setImgModal(false); editorRef.current?.focus(); restoreRange();
    document.execCommand("insertHTML",false,`<figure><img src="${url}" alt="${cap||""}" />${cap?`<figcaption>${cap}</figcaption>`:""}</figure><p><br></p>`);
    onUpdate?.();
  };
  const openVid = () => { saveRange(); setVidModal(true); };
  const insertVid = (url, cap) => {
    if (!url){setVidModal(false);return;}
    const embed=toVideoEmbed(url); if(!embed){setVidModal(false);return;}
    setVidModal(false); editorRef.current?.focus(); restoreRange();
    const capHtml=cap?`<p class="video-cap">${cap}</p>`:"";
    document.execCommand("insertHTML",false,`<div class="video-wrap"><iframe src="${embed.src}" allowfullscreen title="${embed.label} video"></iframe></div>${capHtml}<p><br></p>`);
    onUpdate?.();
  };
  const T = ({t,on,fn,ch}) => <button title={t} className={`tbtn${on?" on":""}`} onMouseDown={e=>{e.preventDefault();fn();}}>{ch}</button>;
  return (
    <>
      <div className="toolbar" onMouseUp={refresh}>
        <T t="Bold" on={fmt.b} fn={()=>exec("bold")} ch={<b>B</b>} />
        <T t="Italic" on={fmt.i} fn={()=>exec("italic")} ch={<em>I</em>} />
        <T t="Underline" on={fmt.u} fn={()=>exec("underline")} ch={<u>U</u>} />
        <div className="tsep" />
        <T t="H2" on={false} fn={()=>exec("formatBlock","H2")} ch="H2" />
        <T t="H3" on={false} fn={()=>exec("formatBlock","H3")} ch="H3" />
        <T t="¶" on={false} fn={()=>exec("formatBlock","P")} ch="¶" />
        <div className="tsep" />
        <T t="Blockquote" on={false} fn={()=>{const s=window.getSelection();if(!s.rangeCount)return;const r=s.getRangeAt(0),bq=document.createElement("blockquote");bq.appendChild(s.isCollapsed?document.createTextNode("Quote…"):r.extractContents());r.insertNode(bq);s.collapse(bq,1);onUpdate?.();}} ch={'"'} />
        <T t="Bullets" on={fmt.ul} fn={()=>exec("insertUnorderedList")} ch="• —" />
        <T t="Numbers" on={fmt.ol} fn={()=>exec("insertOrderedList")} ch="1." />
        <div className="tsep" />
        <T t="Insert photo" on={false} fn={openImg} ch="⬜ Photo" />
        <T t="Embed video" on={false} fn={openVid} ch="▶ Video" />
        <T t="Link" on={false} fn={()=>{const u=prompt("URL:");if(u)exec("createLink",u);}} ch="⌁" />
        <div className="tsep" />
        <T t="Divider" on={false} fn={()=>exec("insertHorizontalRule")} ch="——" />
        <T t="Undo" on={false} fn={()=>exec("undo")} ch="↩" />
        <T t="Redo" on={false} fn={()=>exec("redo")} ch="↪" />
      </div>
      {imgModal && <ImageModal onInsert={insertImg} onClose={()=>setImgModal(false)} />}
      {vidModal && <VideoModal onInsert={insertVid} onClose={()=>setVidModal(false)} />}
    </>
  );
}

function Editor({ article, onSave, onCancel }) {
  const [title,setTitle]=useState(article?.title||"");
  const [subtitle,setSubtitle]=useState(article?.subtitle||"");
  const [location,setLocation]=useState(article?.location||"");
  const [date,setDate]=useState(article?.date||new Date().toISOString().split("T")[0]);
  const [cover,setCover]=useState(article?.coverImage||"");
  const [coverOk,setCoverOk]=useState(!!article?.coverImage);
  const [showUrl,setShowUrl]=useState(!article?.coverImage);
  const [spotifyUrl,setSpotifyUrl]=useState(article?.spotifyUrl||"");
  const editorRef=useRef(null);
  useEffect(()=>{if(editorRef.current)editorRef.current.innerHTML=article?.content||"";},[]);
  const save=(status)=>onSave({...article,id:article?.id||genId(),title,subtitle,location,date,coverImage:cover,spotifyUrl,content:editorRef.current?.innerHTML||"",status,createdAt:article?.createdAt||new Date().toISOString(),updatedAt:new Date().toISOString()});
  const spotifyEmbed=toSpotifyEmbed(spotifyUrl);
  return (
    <div className="ed">
      <div className="ed-top">
        <span className="ed-label">{article?.id?"Edit Article":"New Article"}</span>
        <div className="ed-actions">
          <button className="btn btn-outline btn-sm" onClick={onCancel}>Cancel</button>
          <button className="btn btn-outline btn-sm" onClick={()=>save("draft")}>Save draft</button>
          <button className="btn btn-gold btn-sm" onClick={()=>save("published")}>Publish</button>
        </div>
      </div>
      <div className="cover-zone">
        {cover&&coverOk?(<><img src={cover} className="cover-preview" onError={()=>setCoverOk(false)} /><div className="cover-change-btn"><button className="btn btn-ghost btn-xs" onClick={()=>setShowUrl(v=>!v)}>Change cover</button></div></>):(<div className="cover-placeholder" onClick={()=>setShowUrl(true)}><div className="cover-placeholder-icon">⬜</div><span>Click to add a cover photo</span></div>)}
      </div>
      {showUrl&&(<div className="cover-url-wrap"><input className="ef ef-url" placeholder="Cover image URL" value={cover} onChange={e=>{setCover(e.target.value);setCoverOk(true);}} onBlur={()=>{if(cover)setShowUrl(false);}} autoFocus={!cover} /></div>)}
      <input className="ef ef-title" placeholder="Article title" value={title} onChange={e=>setTitle(e.target.value)} />
      <input className="ef ef-sub" placeholder="Subtitle or standfirst…" value={subtitle} onChange={e=>setSubtitle(e.target.value)} />
      <div className="ef-meta-row">
        <input className="ef" style={{textTransform:"uppercase",letterSpacing:"1px"}} placeholder="Location" value={location} onChange={e=>setLocation(e.target.value)} />
        <input className="ef" type="date" value={date} onChange={e=>setDate(e.target.value)} />
      </div>
      <div className="ed-spacer" />
      <Toolbar editorRef={editorRef} onUpdate={()=>{}} />
      <div ref={editorRef} contentEditable suppressContentEditableWarning className="ed-area" data-ph="Begin writing your dispatch…" />
      <p className="ed-hint">⬜ Photo inserts an image · ▶ Video embeds YouTube or Vimeo · Ctrl+B bold · Ctrl+I italic</p>
      <div className="spotify-ed-section">
        <div className="spotify-ed-label"><SpotifyIcon /> Soundtrack</div>
        <input className="ef ef-url" placeholder="Spotify playlist, album, or track URL (optional)" value={spotifyUrl} onChange={e=>setSpotifyUrl(e.target.value)} />
        <p className="spotify-ed-hint">e.g. https://open.spotify.com/playlist/37i9dQZF1DX…</p>
        {spotifyEmbed&&(<div className="spotify-preview"><iframe src={spotifyEmbed} width="100%" height="152" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy" style={{borderRadius:12}} title="Spotify preview" /></div>)}
      </div>
    </div>
  );
}

function Carousel({ articles, onArticle, onNew }) {
  const [idx,setIdx]=useState(0);
  const [progress,setProgress]=useState(0);
  const [animating,setAnimating]=useState(false);
  const timerRef=useRef(null);
  const pubs=articles.filter(a=>a.status==="published"&&a.coverImage);
  const displayed=pubs.length>0?pubs:articles.filter(a=>a.status==="published");

  const goTo=useCallback((i)=>{
    setIdx(i); setProgress(0); setAnimating(false); clearTimeout(timerRef.current);
    setTimeout(()=>{setProgress(100);setAnimating(true);},60);
    timerRef.current=setTimeout(()=>goTo((i+1)%Math.max(displayed.length,1)),5600);
  },[displayed.length]);

  useEffect(()=>{
    if(displayed.length===0)return;
    setProgress(0); setAnimating(false);
    const t1=setTimeout(()=>{setProgress(100);setAnimating(true);},80);
    timerRef.current=setTimeout(()=>goTo(1%displayed.length),5600);
    return ()=>{clearTimeout(t1);clearTimeout(timerRef.current);};
  },[displayed.length]);

  if(displayed.length===0) return (
    <div className="carousel" style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
      <p style={{fontStyle:"italic",color:"#2a2826",fontSize:22}}>Your journey begins here.</p>
      <button className="btn btn-gold" onClick={onNew}>Write your first article</button>
    </div>
  );

  return (
    <div className="carousel">
      {displayed.map((a,i)=>(
        <div key={a.id} className={`carousel-slide${i===idx%displayed.length?" active":""}`} onClick={()=>onArticle(a)}>
          {a.coverImage&&<img src={a.coverImage} alt="" />}
          <div className="carousel-grad" />
          {a.date&&<span className="carousel-date">{fmtDate(a.date)}</span>}
          <div className="carousel-body">
            {a.location&&<span className="carousel-loc">{a.location}</span>}
            <h2 className="carousel-title">{a.title||"Untitled"}</h2>
            {a.subtitle&&<p className="carousel-sub">{a.subtitle}</p>}
            <button className="carousel-read" onClick={e=>{e.stopPropagation();onArticle(a);}}>Read article →</button>
          </div>
        </div>
      ))}
      <div className={`carousel-progress${animating?" animating":""}`} style={{width:`${progress}%`}} />
      {displayed.length>1&&(<div className="carousel-dots">{displayed.map((_,i)=><button key={i} className={`cdot${i===idx%displayed.length?" on":""}`} onClick={e=>{e.stopPropagation();goTo(i);}} />)}</div>)}
      {displayed.length>1&&<><button className="carousel-arr prev" onClick={e=>{e.stopPropagation();goTo((idx-1+displayed.length)%displayed.length);}}>‹</button><button className="carousel-arr next" onClick={e=>{e.stopPropagation();goTo((idx+1)%displayed.length);}}>›</button></>}
    </div>
  );
}

function Timeline({ articles, onArticle }) {
  const START_YEAR=2005; const now=new Date(); const END_YEAR=now.getFullYear();
  const PX_PER_YEAR=110; const totalWidth=(END_YEAR-START_YEAR+1)*PX_PER_YEAR+80;
  const [hovered,setHovered]=useState(null);
  const [mousePos,setMousePos]=useState({x:0,y:0});
  const pub=articles.filter(a=>a.date);
  const dateToX=(d)=>{const dt=new Date(d+"T12:00:00");return 40+(dt.getFullYear()-START_YEAR+dt.getMonth()/12+dt.getDate()/365)*PX_PER_YEAR;};
  const nowX=40+(END_YEAR-START_YEAR+now.getMonth()/12)*PX_PER_YEAR;
  const handleMouseMove=(e)=>{
    const pw=280,ph=280,vw=window.innerWidth,vh=window.innerHeight;
    let x=e.clientX+18, y=e.clientY-140;
    if(x+pw>vw-12)x=e.clientX-pw-18;
    if(y<12)y=12; if(y+ph>vh-12)y=vh-ph-12;
    setMousePos({x,y});
  };
  const years=[]; for(let y=START_YEAR;y<=END_YEAR;y++)years.push(y);
  const sorted=[...pub].sort((a,b)=>new Date(a.date)-new Date(b.date));
  return (
    <div className="timeline-section">
      <div className="timeline-header">
        <span className="timeline-title">Journey Timeline</span>
        <span className="timeline-years-hint">{START_YEAR} — present · hover to preview</span>
      </div>
      <div className="timeline-scroll" onMouseMove={handleMouseMove}>
        <div className="timeline-inner" style={{width:totalWidth}}>
          <div className="timeline-track" />
          {years.map(y=>{const x=40+(y-START_YEAR)*PX_PER_YEAR;return(<span key={y}><div className="timeline-year-tick" style={{left:x}} /><div className="timeline-year-label" style={{left:x}}>{y}</div></span>);})}
          <div className="today-marker" style={{left:nowX,top:0,bottom:28}} />
          <div className="today-label" style={{left:nowX}}>now</div>
          {sorted.map(a=>{
            const x=dateToX(a.date);
            return(<div key={a.id} className="timeline-pin-wrap" style={{left:x,bottom:36}} onMouseEnter={()=>setHovered(a)} onMouseLeave={()=>setHovered(null)} onClick={()=>onArticle(a)}>
              <div className="timeline-pin-label">{a.location?.split(",")[0]||a.title?.slice(0,16)}</div>
              <div className={`timeline-pin${a.status==="draft"?" draft":""}`} />
            </div>);
          })}
        </div>
      </div>
      {hovered&&(<div className="tl-preview show" style={{left:mousePos.x,top:mousePos.y}}>
        {hovered.coverImage?<img src={hovered.coverImage} className="tl-preview-img" alt="" />:<div className="tl-preview-no-img">✈</div>}
        <div className="tl-preview-body">
          {hovered.location&&<div className="tl-preview-loc">{hovered.location}</div>}
          <div className="tl-preview-title">{hovered.title||"Untitled"}</div>
          {hovered.date&&<div className="tl-preview-date">{fmtDate(hovered.date)}</div>}
          {hovered.status==="draft"&&<div className="tl-preview-draft">Draft</div>}
        </div>
      </div>)}
    </div>
  );
}

const DEFAULT_ABOUT={name:"Your Name",byline:"Writer · Photographer · Wanderer",bio:"I've been chasing horizons since I can remember. This journal is where I make sense of what I see.",portrait:""};

function Footer({ articles, onArticle }) {
  const [about,setAbout]=useState(DEFAULT_ABOUT);
  const [editing,setEditing]=useState(false);
  const [draft,setDraft]=useState(about);

  useEffect(() => {
    db.ref('about').once('value').then(snapshot => {
      if (snapshot.exists()) {
        const data = snapshot.val();
        setAbout(data);
        setDraft(data);
      }
    });
  }, []);

  const save=()=>{
    setAbout(draft);
    db.ref('about').set(draft);
    setEditing(false);
  };
  const recent=[...articles].filter(a=>a.status==="published").sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);
  return (
    <>
      <footer className="footer">
        <div className="footer-main">
          <div className="footer-about">
            {about.portrait?<img src={about.portrait} className="footer-portrait" alt={about.name} />:<div className="footer-portrait-placeholder">👤</div>}
            <div>
              <div className="footer-name">{about.name}</div>
              <div className="footer-byline">{about.byline}</div>
              <p className="footer-bio">{about.bio}</p>
              <button className="btn btn-outline btn-xs" style={{marginTop:14}} onClick={()=>{setDraft(about);setEditing(true);}}>Edit about me</button>
            </div>
          </div>
          <div>
            <div className="footer-col-title">Recent Dispatches</div>
            <div className="footer-links">
              {recent.map(a=>(<div key={a.id} className="footer-link" onClick={()=>onArticle(a)}><span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.title||"Untitled"}</span>{a.location&&<span className="footer-link-loc">{a.location.split(",")[0]}</span>}</div>))}
              {recent.length===0&&<span style={{fontSize:13,color:"#2a2826",fontStyle:"italic"}}>No articles yet</span>}
            </div>
          </div>
        </div>
        <div className="footer-bottom">
          <span className="footer-copy">© {new Date().getFullYear()} · All rights reserved</span>
          <span className="footer-logo">ATLAS<em>.</em></span>
        </div>
      </footer>
      {editing&&(<div className="about-editor-wrap" onClick={()=>setEditing(false)}>
        <div className="about-editor" onClick={e=>e.stopPropagation()}>
          <h3>About me</h3><p>This appears in the footer of your journal</p>
          <input className="ae-field" placeholder="Your name" value={draft.name} onChange={e=>setDraft(d=>({...d,name:e.target.value}))} />
          <input className="ae-field" placeholder="Short byline" value={draft.byline} onChange={e=>setDraft(d=>({...d,byline:e.target.value}))} />
          <textarea className="ae-field" rows={4} placeholder="A short bio…" value={draft.bio} onChange={e=>setDraft(d=>({...d,bio:e.target.value}))} />
          <input className="ae-field" placeholder="Portrait image URL (optional)" value={draft.portrait} onChange={e=>setDraft(d=>({...d,portrait:e.target.value}))} />
          <div className="ae-btns">
            <button className="btn btn-outline btn-sm" onClick={()=>setEditing(false)}>Cancel</button>
            <button className="btn btn-gold btn-sm" onClick={save}>Save</button>
          </div>
        </div>
      </div>)}
    </>
  );
}

function GridCard({ article, onClick }) {
  return (
    <div className="card" onClick={()=>onClick(article)}>
      <div className="card-img">{article.coverImage?<img src={article.coverImage} alt="" />:<div className="card-no-img"><span className="card-no-img-g">✈</span></div>}</div>
      <div className="card-body">
        {article.location&&<div className="card-loc">{article.location}</div>}
        <h3 className="card-title">{article.title||"Untitled"}</h3>
        <p className="card-sub">{article.subtitle||exc(article.content||"")}</p>
        {article.date&&<div className="card-date">{fmtShort(article.date)}</div>}
      </div>
    </div>
  );
}

function DraftRow({ article, onClick, onPublish, onDelete }) {
  return (
    <div className="draft-row" onClick={()=>onClick(article)}>
      <div className="dr-left">
        {article.coverImage?<img src={article.coverImage} className="dr-thumb" onError={e=>e.target.style.display="none"} />:<div className="dr-thumb-empty" />}
        <div className="dr-info">
          <div className={`dr-title${!article.title?" empty":""}`}>{article.title||"Untitled draft"}</div>
          {article.location&&<div className="dr-loc">{article.location}</div>}
        </div>
      </div>
      <div className="dr-right">
        {article.date&&<span className="dr-date">{fmtShort(article.date)}</span>}
        <button className="btn btn-outline btn-xs" onClick={e=>{e.stopPropagation();onPublish(article);}}>Publish</button>
        <button className="btn btn-red btn-xs" onClick={e=>{e.stopPropagation();if(confirm("Delete draft?"))onDelete(article.id);}}>✕</button>
      </div>
    </div>
  );
}

function Home({ articles, onArticle, onPublish, onDelete }) {
  const pub=[...articles].filter(a=>a.status==="published").sort((a,b)=>new Date(b.date)-new Date(a.date));
  const drafts=[...articles].filter(a=>a.status==="draft").sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt));
  return (
    <div className="home">
      {pub.length===0?(<div className="empty"><p className="empty-head">No published articles yet.</p><p className="empty-sub">Write your first dispatch and hit Publish.</p></div>):(<><div className="section-label">All Dispatches</div><div className="grid">{pub.map(a=><GridCard key={a.id} article={a} onClick={onArticle} />)}</div></>)}
      {drafts.length>0&&(<div className="drafts"><div className="drafts-divider"><div className="drafts-divider-line" /><span className="drafts-divider-label">Drafts</span><div className="drafts-divider-line" /></div>{drafts.map(a=><DraftRow key={a.id} article={a} onClick={onArticle} onPublish={a2=>onPublish({...a2,status:"published",updatedAt:new Date().toISOString()})} onDelete={onDelete} />)}</div>)}
    </div>
  );
}

function ArticleView({ article, onEdit, onBack, onToggle, onDelete }) {
  const hasImg=!!article.coverImage;
  const spotifyEmbed=toSpotifyEmbed(article.spotifyUrl||"");
  return (
    <div>
      {hasImg?(<div className="av-hero"><img src={article.coverImage} alt="" /><div className="av-hero-grad" /><div className="av-hero-text">{article.location&&<span className="av-loc">{article.location}</span>}<h1 className="av-title">{article.title||"Untitled"}</h1>{article.subtitle&&<p className="av-sub">{article.subtitle}</p>}</div></div>):(<div className="av-no-hero-text">{article.location&&<span className="av-loc">{article.location}</span>}<h1 className="av-title onpage">{article.title||"Untitled"}</h1>{article.subtitle&&<p className="av-sub onpage">{article.subtitle}</p>}</div>)}
      <div className="av-bar">
        <div className="av-bar-l">
          <button className="btn btn-ghost btn-sm" onClick={onBack}>← All</button>
          {article.date&&<span className="av-date">{fmtDate(article.date)}</span>}
          <span className={`av-status ${article.status==="published"?"pub":"draft"}`}>{article.status}</span>
        </div>
        <div className="av-bar-r">
          <button className="btn btn-outline btn-sm" onClick={()=>onToggle(article)}>{article.status==="published"?"Unpublish":"Publish"}</button>
          <button className="btn btn-outline btn-sm" onClick={()=>onEdit(article)}>Edit</button>
          <button className="btn btn-red btn-sm" onClick={()=>{if(confirm("Delete?"))onDelete(article.id);}}>Delete</button>
        </div>
      </div>
      <div className="av-content">
        <div className="av-body" dangerouslySetInnerHTML={{__html:article.content||"<p>No content yet.</p>"}} />
      </div>
      {spotifyEmbed&&(
        <div className="spotify-section">
          <div className="spotify-rule">
            <div className="spotify-rule-line" />
            <div className="spotify-rule-inner"><SpotifyIcon /><span className="spotify-rule-label">Soundtrack</span></div>
            <div className="spotify-rule-line" />
          </div>
          <div className="spotify-embed-wrap">
            <iframe src={spotifyEmbed} width="100%" height="352" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy" style={{borderRadius:12}} title="Spotify playlist" />
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [articles,setArticles]=useState([]);
  const [view,setView]=useState("home");
  const [selected,setSelected]=useState(null);
  const [ready,setReady]=useState(false);
  const [scrolled,setScrolled]=useState(false);

  useEffect(() => {
    db.ref('articles').once('value').then((snapshot) => {
      const data = snapshot.val();
      const arr = data?.length ? data : SEED;
      setArticles(arr);
      if(!data?.length) db.ref('articles').set(arr);
      setReady(true);
      const el = document.getElementById("loading");
      if(el){el.style.opacity="0";setTimeout(()=>el.remove(),400);}
    });
  }, []);

  useEffect(()=>{
    const onScroll=()=>setScrolled(window.scrollY>40);
    window.addEventListener("scroll",onScroll,{passive:true});
    return ()=>window.removeEventListener("scroll",onScroll);
  },[]);

  const update=useCallback((arr)=>{setArticles(arr);db.ref('articles').set(arr);},[]);
  const handleSave=(article)=>{const u=articles.some(a=>a.id===article.id)?articles.map(a=>a.id===article.id?article:a):[article,...articles];update(u);setSelected(article);setView("article");};
  const handleToggle=(article)=>{const u={...article,status:article.status==="published"?"draft":"published",updatedAt:new Date().toISOString()};update(articles.map(a=>a.id===article.id?u:a));setSelected(u);};
  const handleDelete=(id)=>{update(articles.filter(a=>a.id!==id));setView("home");setSelected(null);};
  const pubCount=articles.filter(a=>a.status==="published").length;
  const openArticle=(a)=>{setSelected(a);setView("article");window.scrollTo(0,0);};
  const openNew=()=>{setSelected(null);setView("editor");window.scrollTo(0,0);};

  if(!ready)return null;

  return (
    <div className="app">
      <style>{CSS}</style>
      <nav className={`nav${scrolled?" scrolled":""}`}>
        <div className="nav-logo" onClick={()=>{setView("home");window.scrollTo(0,0);}}>ATLAS<em>.</em></div>
        <div className="nav-right">
          {pubCount>0&&<span className="nav-count">{pubCount} {pubCount===1?"article":"articles"}</span>}
          <button className="btn btn-gold btn-sm" onClick={openNew}>+ New</button>
        </div>
      </nav>
      {view==="home"&&(<><Carousel articles={articles} onArticle={openArticle} onNew={openNew} /><Timeline articles={articles} onArticle={openArticle} /><Home articles={articles} onArticle={openArticle} onPublish={a=>update(articles.map(x=>x.id===a.id?a:x))} onDelete={handleDelete} /><Footer articles={articles} onArticle={openArticle} /></>)}
      {view==="article"&&selected&&(<><ArticleView article={selected} onBack={()=>setView("home")} onEdit={a=>{setSelected(a);setView("editor");window.scrollTo(0,0);}} onToggle={handleToggle} onDelete={handleDelete} /><Footer articles={articles} onArticle={openArticle} /></>)}
      {view==="editor"&&(<Editor article={selected} onSave={handleSave} onCancel={()=>setView(selected?"article":"home")} />)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
